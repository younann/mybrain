name: SecondBrain
options:
  bundleIdPrefix: com.younan.secondbrain
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    GENERATE_INFOPLIST_FILE: YES
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
targets:
  SecondBrain:
    type: application
    platform: iOS
    sources: [SecondBrain]
    # NOTE: App Group + Share Extension require the paid Apple Developer Program.
    # On a free personal team, leave them off (default below). To re-enable,
    # restore the `dependencies` + `entitlements` blocks (see git history:
    # commit "feat: Chunk 3 Share Extension, App Group store, iCloud toggle").
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.younan.secondbrain
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Second Brain"

  # Dormant on a free team (not embedded by the app). Requires the paid
  # Developer Program (App Groups) to ship. Kept for future use.
  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - ShareExtension
      - SecondBrain/Models
      - SecondBrain/Services
      - SecondBrain/Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.younan.secondbrain.share
        INFOPLIST_KEY_CFBundleDisplayName: "Save to Brain"
    info:
      path: ShareExtension/Info.plist
      properties:
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          NSExtensionPrincipalClass: $(PRODUCT_MODULE_NAME).ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsImageWithMaxCount: 1
              NSExtensionActivationSupportsText: true
    entitlements:
      path: ShareExtension/ShareExtension.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.younan.secondbrain

  SecondBrainTests:
    type: bundle.unit-test
    platform: iOS
    sources: [SecondBrainTests]
    dependencies:
      - target: SecondBrain
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
schemes:
  SecondBrain:
    build:
      targets:
        SecondBrain: all
        SecondBrainTests: [test]
    test:
      targets: [SecondBrainTests]
